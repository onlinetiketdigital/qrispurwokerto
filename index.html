<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purwokerto Run 2026</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin:0;
    background: linear-gradient(135deg,#f5e6d3,#e8d5b5,#d6c2a1);
}

/* Container */
.container {
    max-width:700px;
    margin:auto;
    padding:20px;
}

/* Header */
h1 {
    text-align:center;
    color:#c85a1a;
}

/* Progress */
.progress {
    display:flex;
    justify-content:space-between;
    margin:30px 0;
}

.progress div {
    flex:1;
    text-align:center;
    position:relative;
}

.progress div::before {
    content:'';
    width:30px;
    height:30px;
    display:block;
    margin:auto;
    border-radius:50%;
    background:#ccc;
}

.progress .active::before {
    background:#c85a1a;
}

.progress div::after {
    content:'';
    position:absolute;
    top:15px;
    left:50%;
    width:100%;
    height:4px;
    background:#ccc;
    z-index:-1;
}

.progress div:last-child::after {
    display:none;
}

/* Card */
.card {
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* Hidden */
.step {
    display:none;
}

.step.active {
    display:block;
}

/* Input */
input, select {
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border-radius:10px;
    border:1px solid #ccc;
}

/* Button */
button {
    padding:12px;
    border:none;
    border-radius:10px;
    background:#c85a1a;
    color:white;
    cursor:pointer;
    width:100%;
}

/* QR */
.qr {
    text-align:center;
}

.qr img {
    width:200px;
    margin:15px 0;
}

/* Loading */
.loading {
    height:10px;
    background:#eee;
    border-radius:10px;
    overflow:hidden;
}

.loading div {
    height:100%;
    background:#c85a1a;
    animation:load 3s linear forwards;
}

@keyframes load {
    from {width:0;}
    to {width:100%;}
}
</style>

</head>
<body>

<div class="container">

<h1>🏃 PURWOKERTO RUN 2026</h1>

<!-- Progress -->
<div class="progress">
    <div class="active">1</div>
    <div>2</div>
    <div>3</div>
</div>

<div class="card">

<!-- STEP 1 -->
<div class="step active" id="step1">
    <h3>Step 1: Data Peserta</h3>

    <input type="text" placeholder="Nama Lengkap" required>
    <input type="email" placeholder="Email" required>
    <input type="tel" placeholder="No HP" required>

    <select>
        <option value="">Pilih Kategori</option>
        <option>5K - Rp150.000</option>
        <option>10K - Rp175.000</option>
    </select>

    <button onclick="nextStep(2)">LANJUT KE PEMBAYARAN</button>
</div>

<!-- STEP 2 -->
<div class="step" id="step2">
    <h3>Step 2: Pembayaran QRIS</h3>
    <p>Silakan scan QR berikut untuk pembayaran</p>

    <div class="qr">
        <img src="qris.png" alt="QRIS">
    </div>

    <button onclick="nextStep(3)">SAYA SUDAH BAYAR</button>
</div>

<!-- STEP 3 -->
<div class="step" id="step3">
    <h3>Step 3: Status Pendaftaran</h3>

    <h2>⏳ PENDING</h2>
    <p>Verifikasi pembayaran sedang diproses</p>

    <div class="loading"><div></div></div>

    <p>Redirect ke pembayaran resmi...</p>
</div>

</div>
</div>

<script>
function nextStep(step){
    document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
    document.getElementById('step'+step).classList.add('active');

    document.querySelectorAll('.progress div').forEach(p=>p.classList.remove('active'));
    for(let i=0;i<step;i++){
        document.querySelectorAll('.progress div')[i].classList.add('active');
    }

    if(step === 3){
        setTimeout(()=>{
            window.location.href="https://www.qrispurwokerto.run";
        },3000);
    }
}
</script>

</body>
</html>
