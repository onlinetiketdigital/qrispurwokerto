<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purwokerto Run 2026</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin:0;
    background: linear-gradient(135deg,#f5e6d3,#e8d5b5,#d6c2a1);
}

.container {
    max-width:750px;
    margin:auto;
    padding:20px;
}

.header {
    text-align:center;
}

.header img {
    width:80px;
}

.progress {
    display:flex;
    margin:20px 0;
}

.progress div {
    flex:1;
    text-align:center;
}

.progress .active {
    font-weight:bold;
    color:#c85a1a;
}

.card {
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.step {display:none;}
.step.active {display:block;}

input, select, textarea {
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

button {
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#c85a1a;
    color:white;
    cursor:pointer;
}

.qr img {
    width:200px;
}

.sizechart {
    display:none;
    text-align:center;
}

.sizechart img {
    width:100%;
    max-width:300px;
}

.loading {
    height:10px;
    background:#eee;
    border-radius:10px;
    overflow:hidden;
}

.loading div {
    height:100%;
    background:#c85a1a;
    animation:load 3s linear forwards;
}

@keyframes load {
    from {width:0;}
    to {width:100%;}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <img src="logo.png">
    <h2>Purwokerto Run 2026</h2>
</div>

<div class="progress">
    <div class="active">Data</div>
    <div>Pembayaran</div>
    <div>Finish</div>
</div>

<div class="card">

<!-- STEP 1 -->
<div class="step active" id="step1">
<h3>Data Peserta</h3>

<input type="text" placeholder="Nama Lengkap" required>
<input type="text" placeholder="Tempat Lahir" required>
<input type="date" required>

<input type="text" placeholder="Nama BIB (Nama di Jersey)" required>

<textarea placeholder="Alamat Lengkap"></textarea>

<input type="tel" placeholder="No HP">

<select>
<option>Pilih Kategori</option>
<option>5K - Rp150.000</option>
<option>10K - Rp175.000</option>
</select>

<select onchange="showSizeChart()">
<option>Pilih Ukuran Kaos</option>
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

<div class="sizechart" id="sizechart">
    <p>Size Chart:</p>
    <img src="sizechart.png">
</div>

<button onclick="nextStep(2)">LANJUT</button>
</div>

<!-- STEP 2 -->
<div class="step" id="step2">
<h3>Pembayaran QRIS</h3>

<div class="qr">
    <img src="qris.png">
</div>

<p>Upload bukti pembayaran:</p>
<input type="file" required>

<button onclick="nextStep(3)">KONFIRMASI</button>
</div>

<!-- STEP 3 -->
<div class="step" id="step3">
<h3>Status</h3>

<h2>⏳ PENDING</h2>
<p>Menunggu verifikasi panitia</p>

<div class="loading"><div></div></div>

<p>Redirect ke halaman pembayaran...</p>
</div>

</div>
</div>

<script>
function nextStep(step){
    document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
    document.getElementById('step'+step).classList.add('active');

    document.querySelectorAll('.progress div').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.progress div')[step-1].classList.add('active');

    if(step===3){
        setTimeout(()=>{
            window.location.href="https://www.qrispurwokerto.run";
        },3000);
    }
}

function showSizeChart(){
    document.getElementById("sizechart").style.display="block";
}
</script>

</body>
</html>
